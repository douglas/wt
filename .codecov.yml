# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        target: 65%
        threshold: 2%
    patch:
      default:
        informational: true
        target: 70%

ignore:
  - "e2e/**"

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
