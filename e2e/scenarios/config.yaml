# E2E tests for `wt config` commands
name: config
description: Test configuration file management

scenarios:
  - name: config_path_outputs_path
    description: Config path outputs a file path
    skip_shellenv: true
    steps:
      - run: $WT_BIN config path
        expect:
          exit_code: 0
          output_contains: "config.toml"

  - name: config_show_defaults
    description: Config show displays default values
    skip_shellenv: true
    steps:
      - run: $WT_BIN config show
        expect:
          exit_code: 0
          output_contains: "not found"
      - run: $WT_BIN config show
        expect:
          output_contains: "global"

  - name: config_show_sources
    description: Config show displays source tracking
    skip_shellenv: true
    steps:
      - run: $WT_BIN config show
        expect:
          exit_code: 0
          output_contains: "default"

  - name: config_init_creates_file
    description: Config init creates a config file
    skip_shellenv: true
    steps:
      - run: $WT_BIN --config "$WORKTREE_ROOT/wt-config/config.toml" config init
        expect:
          exit_code: 0
          output_contains: "Created config file"

  - name: config_init_fails_if_exists
    description: Config init fails if file already exists
    skip_shellenv: true
    skip_shells: [powershell]
    steps:
      - run: $WT_BIN --config "$WORKTREE_ROOT/wt-config2/config.toml" config init
        expect:
          exit_code: 0
      - run: $WT_BIN --config "$WORKTREE_ROOT/wt-config2/config.toml" config init
        expect:
          exit_code: 1
          output_contains: "already exists"

  - name: config_init_force_overwrites
    description: Config init --force overwrites existing file
    skip_shellenv: true
    steps:
      - run: $WT_BIN --config "$WORKTREE_ROOT/wt-config3/config.toml" config init
        expect:
          exit_code: 0
      - run: $WT_BIN --config "$WORKTREE_ROOT/wt-config3/config.toml" config init --force
        expect:
          exit_code: 0
          output_contains: "Created config file"

  - name: config_file_shows_found
    description: Config show reports found when config file exists
    skip_shellenv: true
    steps:
      - run: $WT_BIN --config "$WORKTREE_ROOT/wt-cfg4/config.toml" config init
        expect:
          exit_code: 0
      - run: $WT_BIN --config "$WORKTREE_ROOT/wt-cfg4/config.toml" config show
        expect:
          exit_code: 0
          output_contains: "found"
          output_not_contains: "not found"

  - name: config_env_overrides
    description: Environment variables override default and config file values
    skip_shellenv: true
    steps:
      - run: $WT_BIN --config "$WORKTREE_ROOT/wt-cfg5/config.toml" config init
        expect:
          exit_code: 0
      - run: $WT_BIN --config "$WORKTREE_ROOT/wt-cfg5/config.toml" config show
        env:
          WORKTREE_STRATEGY: parent-branches
        expect:
          exit_code: 0
          output_contains: "parent-branches"
