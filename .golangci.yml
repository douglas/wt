run:
  timeout: 5m
  go: '1.26'

linters:
  enable:
    - errcheck
    - exhaustive
    - gocritic
    - gofmt
    - gosec
    - gosimple
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - typecheck
    - unconvert
    - unused
    - whitespace

linters-settings:
  errcheck:
    check-blank: false
    check-type-assertions: false
  nolintlint:
    require-explanation: true
    require-specific: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: _test\.go
      linters:
        - gosec
    - path: cleanup_test\.go
      text: "G204"
