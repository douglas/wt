# GoReleaser configuration for wt
# https://goreleaser.com

version: 2

project_name: wt

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: wt
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

# AUR package
aurs:
  - name: wt-go
    homepage: https://github.com/douglas/wt
    description: Git worktree manager with organized directory structure (Go implementation)
    maintainers:
      - 'Douglas Soares de Andrade <contato@douglasandrade.com>'
    license: MIT
    private_key: '{{ .Env.AUR_SSH_KEY }}'
    git_url: 'ssh://aur@aur.archlinux.org/wt-go.git'
    provides:
      - wt
    conflicts:
      - wt
      - wt-zig
    depends:
      - glibc
      - git
    optdepends:
      - 'github-cli: for wt pr command'
      - 'glab: for wt mr command'
    package: |-
      install -Dm755 wt "${pkgdir}/usr/bin/wt"
      install -Dm644 LICENSE "${pkgdir}/usr/share/licenses/wt-go/LICENSE"

release:
  github:
    owner: douglas
    name: wt
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"
